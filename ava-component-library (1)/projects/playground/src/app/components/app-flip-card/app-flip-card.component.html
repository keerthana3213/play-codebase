<div class="flip-card-demo">
  <div class="demo-section">
    <div class="demo-grid">
      <!-- Blue Theme -->
      <div class="demo-item">
        <aava-flip-card
          frontTitle="FLIP CARD"
          frontText="Hover Me"
          backTitle="I AM FLIPPED"
          backText="Hola!"
          [colors]="{
            frontGradient: {
              color1: '#dbeafe',
              color2: '#bfdbfe',
              color3: '#93c5fd',
              color4: 'rgba(59, 130, 246, 0.6)'
            },
            backGradient: {
              color1: '#3b82f6',
              color2: '#2563eb',
              color3: '#1d4ed8',
              color4: '#1e40af'
            },
            frontText: '#1e40af',
            backText: 'white',
            border: '#3b82f6'
          }"
        >
        </aava-flip-card>
      </div>
    </div>
  </div>
</div>
