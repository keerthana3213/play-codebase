<div class="slider-section">
  <div>
    <aava-slider
      [min]="0"
      [max]="100"
      [value]="50"
      [iconStart]="'volume-x'"
      [iconEnd]="'volume-2'"
    >
    </aava-slider>
    <h4>Volume Control with Start/End Icons</h4>
  </div>

  <div>
    <aava-slider
      [min]="0"
      [max]="100"
      [value]="75"
      [handleIcon]="'sun'"
      [iconStart]="'moon'"
      [iconEnd]="'sun'"
    >
    </aava-slider>
    <h4>Brightness with Handle Icon</h4>
  </div>
</div>
