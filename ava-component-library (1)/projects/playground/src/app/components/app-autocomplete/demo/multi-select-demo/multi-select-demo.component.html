<div class="demo-section">
    <div class="demo-container">
        <aava-autocomplete [options]="options" [multi]="true" placeholder="Search for countries..."
            label="Select countries" helper="Start typing to see filtered options" tagColor="primary"
            tagVariant="filled" tagSize="sm" [tagPill]="true" [tagRemovable]="true"
            (valueChange)="onValueChange($event)"></aava-autocomplete>
    </div>
</div>
