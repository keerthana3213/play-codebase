<div class="demo-container">
  <h2>Filter Sizes</h2>
  <p>Different filter sizes (xs to xl) and visual variants.</p>

  <div class="sizes-grid">
    <div class="size-xs">
      <aava-filter size="xs" label="XS Filter" [options]="options" [width]="100">
      </aava-filter>
    </div>

    <div class="size-sm">
      <aava-filter size="sm" label="SM Filter" [options]="options" [width]="120">
      </aava-filter>
    </div>

    <div class="size-md">
      <aava-filter size="md" label="MD Filter" [options]="options"[width]="150">
      </aava-filter>
    </div>

    <div class="size-lg">
      <aava-filter size="lg" label="LG Filter" [options]="options" [width]="200">
      </aava-filter>
    </div>

    <div class="size-xl">
      <aava-filter size="xl" label="XL Filter" [options]="options" [width]="250">
      </aava-filter>
    </div>
  </div>
</div>
