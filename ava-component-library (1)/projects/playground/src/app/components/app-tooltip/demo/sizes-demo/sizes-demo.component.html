<div class="demo-container">
  <h2>Tooltip Sizes</h2>
  <p class="demo-description">
    Tooltip can be sized via the size config: small, medium (default),
    large.
  </p>
  <div class="sizes-grid">
    <aava-button label="Small Tooltip" variant="primary" size="md" state="default" tooltipDescription="Small Tooltip"
      tooltipType="simple" tooltipTrigger="hover" tooltipPosition="top" tooltipSize="sm"></aava-button>
    <aava-button label="Medium Tooltip" variant="primary" size="md" state="default" tooltipDescription="Medium Tooltip"
      tooltipType="simple" tooltipTrigger="hover" tooltipPosition="top" tooltipSize="md"></aava-button>
    <aava-button label="Large Tooltip" variant="primary" size="md" state="default" tooltipDescription="Large Tooltip"
      tooltipType="simple" tooltipTrigger="hover" tooltipPosition="top" tooltipSize="lg"></aava-button>
  </div>
</div>
