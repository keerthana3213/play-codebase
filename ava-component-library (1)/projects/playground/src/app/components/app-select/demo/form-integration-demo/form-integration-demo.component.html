<div class="demo-section center-demo">
  <div class="demo-examples">
    <div class="example-group">
      <form [formGroup]="reactiveForm" (ngSubmit)="onReactiveSubmit()">
        <aava-select
          label="Select User"
          placeholder="Select a user"
          formControlName="userId"
          [required]="true"
          [error]="getFieldError('userId')">
          <aava-select-option value="1">John Doe</aava-select-option>
          <aava-select-option value="2">Jane Smith</aava-select-option>
          <aava-select-option value="3">Jack Wilson</aava-select-option>
          <aava-select-option value="4">James Brown</aava-select-option>
        </aava-select>

        <div class="form-status">
          Form Valid: {{reactiveForm.valid}} | Form Value: {{reactiveForm.value | json}}
        </div>

        <div class="button-group">
          <aava-button
            type="submit"
            variant="primary"
            label="Submit"
            [disabled]="!reactiveForm.valid">
          </aava-button>
          <aava-button
            type="button"
            variant="secondary"
            label="Reset"
            (click)="resetReactiveForm()">
          </aava-button>
        </div>
      </form>
    </div>
  </div>
</div>
