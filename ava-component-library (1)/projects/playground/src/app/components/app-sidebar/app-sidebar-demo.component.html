<div class="sidebar-demo-container">
  <header class="demo-header">
    <h1>Sidebar Component</h1>
    <p>
      A comprehensive sidebar navigation component with collapsible
      functionality, nested menus, user profiles, and search capabilities for
      building modern application layouts.
    </p>
  </header>

  <section class="demo-sections">
    <h2>Demo Pages</h2>
    <div class="sections-grid">
      <div
        *ngFor="let section of sections"
        class="section-card"
        [routerLink]="section.route"
      >
        <span class="section-icon">{{ section.icon }}</span>
        <h3>{{ section.title }}</h3>
        <p>{{ section.description }}</p>
      </div>
    </div>
  </section>
