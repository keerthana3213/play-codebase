<div class="views-card-demo">
  <div class="demo-section">
    <div class="demo-grid">
      <!-- Default Blue Theme -->
      <div class="demo-item">
        <aava-views-card value="750k" label="Views"> </aava-views-card>
      </div>

      <!-- Blue Theme -->
      <div class="demo-item">
        <aava-views-card value="1.2M" label="Downloads" [colors]="{
            outerGradient: { start: '#ffffff', end: '#0c0d0d' },
            cardGradient: { start: '#1e3a8a', end: '#0c0d0d' },
            textGradient: { start: '#000000', middle: '#fff', end: '#000' },
            topLineGradient: { start: '#3b82f6', end: '#1d1f1f' },
            leftLineGradient: { start: '#60a5fa', end: '#222424' },
            dot: '#2563eb',
            dotShadow: '#2563eb',
            ray: '#3b82f6',
            rayShadow: '#2563eb',
            line: '#2c2c2c'
          }">
        </aava-views-card>
      </div>

      <!-- Purple Theme -->
      <div class="demo-item">
        <aava-views-card value="89k" label="Likes" [colors]="{
            outerGradient: { start: '#ffffff', end: '#0c0d0d' },
            cardGradient: { start: '#4a148c', end: '#0c0d0d' },
            textGradient: { start: '#000000', middle: '#fff', end: '#000' },
            topLineGradient: { start: '#9c27b0', end: '#1d1f1f' },
            leftLineGradient: { start: '#ba68c8', end: '#222424' },
            dot: '#6f42c1',
            dotShadow: '#6f42c1',
            ray: '#9c27b0',
            rayShadow: '#6f42c1',
            line: '#2c2c2c'
          }">
        </aava-views-card>
      </div>

      <!-- Orange/Amber Theme -->
      <div class="demo-item">
        <aava-views-card value="456k" label="Shares" [colors]="{
            outerGradient: { start: '#ffffff', end: '#0c0d0d' },
            cardGradient: { start: '#92400e', end: '#0c0d0d' },
            textGradient: { start: '#000000', middle: '#fff', end: '#000' },
            topLineGradient: { start: '#f59e0b', end: '#1d1f1f' },
            leftLineGradient: { start: '#fbbf24', end: '#222424' },
            dot: '#d97706',
            dotShadow: '#d97706',
            ray: '#f59e0b',
            rayShadow: '#d97706',
            line: '#2c2c2c'
          }">
        </aava-views-card>
      </div>
    </div>
  </div>
</div>
