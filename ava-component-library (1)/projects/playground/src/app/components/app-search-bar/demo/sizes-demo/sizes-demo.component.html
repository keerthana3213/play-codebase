<div class="demo-container">
  <div class="sizes-demo">
    <div class="demo-section">
      <div class="size-comparison">
        <div class="size-item">
          <aava-search-bar placeholder="XS" size="xs" (searchClick)="onSearch($event, 'xs')"></aava-search-bar>
        </div>
        <div class="size-item">
          <aava-search-bar placeholder="SM" size="sm" (searchClick)="onSearch($event, 'sm')"></aava-search-bar>
        </div>
        <div class="size-item">
          <aava-search-bar placeholder="MD" size="md" (searchClick)="onSearch($event, 'md')"></aava-search-bar>
        </div>
        <div class="size-item">
          <aava-search-bar placeholder="LG" size="lg" (searchClick)="onSearch($event, 'lg')"></aava-search-bar>
        </div>
        <div class="size-item">
          <aava-search-bar placeholder="XL" size="xl" (searchClick)="onSearch($event, 'xl')"></aava-search-bar>
        </div>
      </div>
    </div>
  </div>
</div>
