<div style="max-width: 840px; margin: 0 auto" class="demo-container">
  <h3 style="color: var(--color-text-primary)">Horizontal Dividers</h3>
  <aava-dividers
    variant="solid"
    orientation="horizontal"
    color="#007bff"
  ></aava-dividers>

  <aava-dividers
    variant="dashed"
    orientation="horizontal"
    color="#28a745"
  ></aava-dividers>

  <h3 style="color: var(--color-text-primary); text-align: center">
    Vertical Dividers
  </h3>
  <div
    style="
      display: flex;
      gap: 24px;
      align-items: center;
      justify-content: center;
    "
  >
    <aava-dividers
      variant="solid"
      orientation="vertical"
      color="#dc3545"
    ></aava-dividers>

    <aava-dividers
      variant="dotted"
      orientation="vertical"
      color="#ffc107"
    ></aava-dividers>
  </div>
</div>
