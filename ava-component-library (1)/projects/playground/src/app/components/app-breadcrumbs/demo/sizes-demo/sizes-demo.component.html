<div class="sizes-demo">
  <div class="demo-content">
    <ava-breadcrumbs-demo-card
      title="Extra Small Size"
      description="Compact breadcrumbs for dense layouts and mobile interfaces."
    >
      <aava-breadcrumbs [breadcrumbs]="sampleBreadcrumbs" size="xs">
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>

    <ava-breadcrumbs-demo-card
      title="Small Size"
      description="Compact breadcrumbs for dense layouts and mobile interfaces."
    >
      <aava-breadcrumbs [breadcrumbs]="sampleBreadcrumbs" size="sm">
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>

    <ava-breadcrumbs-demo-card
      title="Medium Size (Default)"
      description="Standard breadcrumbs for most common use cases and layouts."
    >
      <aava-breadcrumbs [breadcrumbs]="sampleBreadcrumbs" size="md">
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>

    <ava-breadcrumbs-demo-card
      title="Large Size"
      description="Prominent breadcrumbs for hero sections and important navigation."
    >
      <aava-breadcrumbs [breadcrumbs]="sampleBreadcrumbs" size="lg">
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>
  </div>
</div>
