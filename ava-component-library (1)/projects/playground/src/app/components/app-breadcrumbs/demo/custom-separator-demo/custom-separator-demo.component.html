<div class="custom-separator-demo">
  <div class="demo-content">
    <ava-breadcrumbs-demo-card
      title="Default Separator"
      description="Standard chevron-right separator with default size."
    >
      <aava-breadcrumbs
        [breadcrumbs]="sampleBreadcrumbs"
        separatorIcon="chevron-right"
        [separatorSize]="14"
      >
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>

    <ava-breadcrumbs-demo-card
      title="Arrow Separator"
      description="Arrow right separator for a more prominent navigation indicator."
    >
      <aava-breadcrumbs
        [breadcrumbs]="sampleBreadcrumbs"
        separatorIcon="arrow-right"
        [separatorSize]="14"
      >
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>

    <ava-breadcrumbs-demo-card
      title="Slash Separator"
      description="Forward slash separator for a classic file path appearance."
    >
      <aava-breadcrumbs
        [breadcrumbs]="sampleBreadcrumbs"
        separatorIcon="slash"
        [separatorSize]="14"
      >
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>

    <ava-breadcrumbs-demo-card
      title="Small Separator (12px)"
      description="Smaller separator size for compact layouts."
    >
      <aava-breadcrumbs
        [breadcrumbs]="sampleBreadcrumbs"
        separatorIcon="chevron-right"
        [separatorSize]="12"
      >
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>

    <ava-breadcrumbs-demo-card
      title="Large Separator (18px)"
      description="Larger separator size for prominent navigation."
    >
      <aava-breadcrumbs
        [breadcrumbs]="sampleBreadcrumbs"
        separatorIcon="chevron-right"
        [separatorSize]="18"
      >
      </aava-breadcrumbs>
    </ava-breadcrumbs-demo-card>
  </div>
</div>
