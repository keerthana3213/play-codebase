<div class="carousel-demo">
  <!-- Navigation Links to Demo Sections -->
  <div class="demo-navigation">
    <div class="container">
      <h1>Carousel Component Demo</h1>
      <p>Stacked card carousel component with size variants.</p>
      <div class="row">
        <div class="col-12">
          <div class="nav-links">
            <h3>Demo Sections</h3>
            <div class="nav-grid">
              <a routerLink="/carousel/basic" class="nav-link">
                <span class="nav-icon">📝</span>
                <span class="nav-text">Basic Usage</span>
              </a>
              <a routerLink="/carousel/size" class="nav-link">
                <span class="nav-icon">📏</span>
                <span class="nav-text">Sizes</span>
              </a>
              <a routerLink="/carousel/autoplay" class="nav-link">
                <span class="nav-icon">☑️</span>
                <span class="nav-text">AutoPlay</span>
              </a>
              <a routerLink="/carousel/title" class="nav-link">
                <span class="nav-icon">⚡</span>
                <span class="nav-text">With Title</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <h2>Size Variants</h2>
  <!-- Large Carousel -->
  <div class="demo-section">
    <h3>Large (lg)</h3>
    <div class="carousel-container">
      <aava-carousel [items]="carouselItems" size="lg"> </aava-carousel>
    </div>
  </div>
  <!-- Medium Carousel (Default) -->
  <div class="demo-section">
    <h3>Medium (md) - Default</h3>
    <div class="carousel-container">
      <aava-carousel [items]="carouselItems" size="md"> </aava-carousel>
    </div>
  </div>
  <!-- Small Carousel -->
  <div class="demo-section">
    <h3>Small (sm)</h3>
    <div class="carousel-container">
      <aava-carousel [items]="carouselItems" size="sm"> </aava-carousel>
    </div>
  </div>
  <!-- Extra Small Carousel -->
  <div class="demo-section">
    <h3>Extra Small (xs)</h3>
    <div class="carousel-container">
      <aava-carousel [items]="carouselItems" size="xs"> </aava-carousel>
    </div>
  </div>
  <div class="demo-section">
    <h3>Carousel Auto play</h3>
    <div class="carousel-container">
      <aava-carousel [items]="carouselItems" size="md" [autoplay]="true">
      </aava-carousel>
    </div>
  </div>
  <div class="demo-section">
    <h3>Carousel with Titles</h3>
    <div class="carousel-container">
      <aava-carousel [items]="carouselItemsWithTitles" size="md">
      </aava-carousel>
    </div>
  </div>
</div>
