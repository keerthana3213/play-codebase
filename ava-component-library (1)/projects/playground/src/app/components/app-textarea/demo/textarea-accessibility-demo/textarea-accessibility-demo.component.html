<div class="demo-container">
  <div class="demo-grid">
    <!-- Left Column -->
    <div class="demo-column padl">
      <h3 style="color: var(--color-text-primary)">Labeled Textarea</h3>
      <aava-textarea [(ngModel)]="labeledValue" label="Description" placeholder="Enter your description..." [rows]="3"
        (textareaChange)="onLabeledChange($event)"></aava-textarea>

      <h3 style="color: var(--color-text-primary)">Textarea with Helper Text</h3>
      <aava-textarea [(ngModel)]="helperValue" label="Comments" placeholder="Share your thoughts..."
        helper="Please provide detailed feedback to help us improve our service." [rows]="3"
        (textareaChange)="onHelperChange($event)"></aava-textarea>

      <h3 style="color: var(--color-text-primary)">Textarea with Error State</h3>
      <aava-textarea [(ngModel)]="errorValue" label="Email" placeholder="Enter your email..."
        error="Please enter a valid email address." [rows]="3" (textareaChange)="onErrorChange($event)"></aava-textarea>
    </div>

    <!-- Right Column -->
    <div class="demo-column padr">



      <h3 style="color: var(--color-text-primary)">Required Textarea</h3>
      <aava-textarea [(ngModel)]="requiredValue" label="Required Field" placeholder="This field is required..."
        [required]="true" [rows]="3" (textareaChange)="onRequiredChange($event)"></aava-textarea>

      <h3 style="color: var(--color-text-primary)">
        Textarea with Character Limit
      </h3>
      <aava-textarea [(ngModel)]="maxLengthValue" label="Bio"
        placeholder="Tell us about yourself (max 200 characters)..." [maxlength]="200" [rows]="3"
        (textareaChange)="onMaxLengthChange($event)"></aava-textarea>
      <div class="char-count">Characters: {{ maxLengthValue.length }}/200</div>
    </div>
  </div>
</div>
