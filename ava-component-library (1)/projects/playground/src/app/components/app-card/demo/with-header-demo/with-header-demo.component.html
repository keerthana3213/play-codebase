<div class="with-header-demo">
  <div class="demo-section">
    <div class="demo-grid">
      <div class="demo-item">
        <aava-default-card>
          <aava-card-header>
            <div class="header-with-icon">
              <aava-icon
                iconName="shield-check"
                [iconSize]="24"
                iconColor="#28a745"
              ></aava-icon>
              <h4>Security Settings</h4>
            </div>
          </aava-card-header>
          <aava-card-content>
            <p>
              Icons in headers help convey meaning quickly and add visual
              interest. This card shows security-related settings.
            </p>
            <ul class="settings-list">
              <li>Two-factor authentication enabled</li>
              <li>Password strength: Strong</li>
              <li>Last login: 2 hours ago</li>
            </ul>
          </aava-card-content>
        </aava-default-card>
      </div>
    </div>
  </div>
</div>
