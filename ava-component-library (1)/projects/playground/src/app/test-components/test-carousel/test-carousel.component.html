<div class="carousel-demo">
    <!-- Large Carousel -->
    <div class="demo-section">
        <h3>Large (lg)</h3>
        <div class="carousel-container">
            <aava-carousel [items]="carouselItems" size="lg">
            </aava-carousel>
        </div>
    </div>
    <!-- Medium Carousel (Default) -->
    <div class="demo-section">
        <h3>Medium (md) - Default</h3>
        <div class="carousel-container">
            <aava-carousel [items]="carouselItems" size="md">
            </aava-carousel>
        </div>
    </div>
    <!-- Small Carousel -->
    <div class="demo-section">
        <h3>Small (sm)</h3>
        <div class="carousel-container">
            <aava-carousel [items]="carouselItems" size="sm">
            </aava-carousel>
        </div>
    </div>
    <!-- Extra Small Carousel -->
    <div class="demo-section">
        <h3>Extra Small (xs)</h3>
        <div class="carousel-container">
            <aava-carousel [items]="carouselItems" size="xs">
            </aava-carousel>
        </div>
    </div>
    <div class="demo-section">
        <h3>Carousel Auto play</h3>
        <div class="carousel-container">
            <aava-carousel [items]="carouselItems" size="md" [autoplay]="true">
            </aava-carousel>
        </div>
    </div>
    <div class="demo-section">
        <h3>Carousel with Titles</h3>
        <div class="carousel-container">
            <aava-carousel [items]="carouselItemsWithTitles" size="md">
            </aava-carousel>
        </div>
    </div>
</div>
