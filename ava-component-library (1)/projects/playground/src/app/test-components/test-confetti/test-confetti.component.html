<!-- Single container with all buttons -->
<div class="confetti-showcase">
    <aava-button label="🎊 Bottom Explosion" variant="primary" aavaConfetti="bottom"
        [confettiConfig]="bottomConfig" confettiTrigger="click">
    </aava-button>
    
    <aava-button label="🌧️ Falling Rain" variant="success" aavaConfetti="falling"
        [confettiConfig]="fallingConfig" confettiTrigger="click">
    </aava-button>
    
    <aava-button label="⚡ Side Burst" variant="secondary" aavaConfetti="side" 
        [confettiConfig]="sideConfig" confettiTrigger="click">
    </aava-button>
    
    <aava-button label="💥 Single Burst" variant="warning" aavaConfetti="single"
        [confettiConfig]="singleConfig" confettiTrigger="click">
    </aava-button>
    
    <aava-button label="🎆 Multiple Explosions" variant="danger" aavaConfetti="explosions"
        [confettiConfig]="explosionsConfig" confettiTrigger="click">
    </aava-button>
    
    <!-- Shape Variations -->
    <aava-button label="⭕ Circles Only" variant="primary" aavaConfetti="bottom"
        [confettiConfig]="circleShapesConfig" confettiTrigger="click">
    </aava-button>
    
    <aava-button label="⬜ Squares Only" variant="secondary" aavaConfetti="falling"
        [confettiConfig]="squareShapesConfig" confettiTrigger="click">
    </aava-button>
    
    <aava-button label="🔺 Triangles Only" variant="success" aavaConfetti="side"
        [confettiConfig]="triangleShapesConfig" confettiTrigger="click">
    </aava-button>
    
    <aava-button label="🎨 All Shapes Mixed" variant="warning" aavaConfetti="explosions"
        [confettiConfig]="mixedShapesConfig" confettiTrigger="click">
    </aava-button>
    
    <!-- Extreme Examples -->
    <aava-button label="🎉 MEGA CELEBRATION!" variant="danger" aavaConfetti="explosions"
        [confettiConfig]="megaConfig" confettiTrigger="click">
    </aava-button>
    
    <aava-button label="🌈 Rainbow Cascade" variant="primary" aavaConfetti="falling"
        [confettiConfig]="rainbowConfig" confettiTrigger="click">
    </aava-button>
</div>
