<div class="demo-section">

  <!-- ================== COUNT BADGES ================== -->
  <h3>Count Badges</h3>
  <div class="badge-group">

    <!-- High Priority -->
    <div class="badge-row">
      <aava-badges state="high-priority" size="lg" [count]="9"></aava-badges>
      <aava-badges state="high-priority" size="md" [count]="9"></aava-badges>
      <aava-badges state="high-priority" size="sm" [count]="9"></aava-badges>
      <aava-badges state="high-priority" size="xs" [count]="9"></aava-badges>
    </div>

    <!-- Medium Priority -->

      <aava-badges state="medium-priority" size="xs" [count]="9"></aava-badges>
