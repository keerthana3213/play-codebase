<div class="ava-reset-password">
  <!-- Password Input -->
  <div class="ava-reset-password__field">
    <aava-textbox
      [label]="label"
      [placeholder]="placeholder"
      [(ngModel)]="password"
      [type]="showPassword ? 'text' : 'password'"
      [size]="size"
      [disabled]="disabled"
      [minlength]="minlength ? minlength : null"
      [maxlength]="maxlength ? maxlength : null"
      (ngModelChange)="onPasswordInput()"
      [error]="
        password.length > 0 && hasAnyRuleFailed
          ? 'Password does not meet requirements'
          : ''
      "
    >
      <!-- Eye icon to toggle password visibility -->
      <aava-icon
        slot="icon-end"
        [iconName]="showPassword ? 'eye' : 'eye-off'"
        [iconSize]="20"
        (click)="togglePasswordVisibility()"
        class="password-toggle-icon"
      ></aava-icon>
    </aava-textbox>
  </div>

  <!-- Password Strength Indicator (Optional) -->
  <div
    *ngIf="showPasswordStrength && password.length > 0"
    class="ava-reset-password__strength"
  >
    <div class="strength-bar">
      <div
        class="strength-bar__fill"
        [class.strength-bar__fill--weak]="passwordStrength === 'weak'"
        [class.strength-bar__fill--medium]="passwordStrength === 'medium'"
        [class.strength-bar__fill--strong]="passwordStrength === 'strong'"
      ></div>
    </div>
    <span class="strength-label" [attr.data-strength]="passwordStrength">
      {{ passwordStrength | titlecase }}
    </span>
  </div>

  <!-- Password Rules Validation -->
  <div class="ava-reset-password__rules" *ngIf="rules.length > 0">
    <div
      *ngFor="let rule of rulesValidation"
      class="rule-item"
      [class.rule-item--valid]="rule.isValid"
      [class.rule-item--invalid]="!rule.isValid && password.length > 0"
    >
      <aava-icon
        [iconName]="rule.isValid ? 'check-circle' : 'circle-x'"
        [iconSize]="16"
        class="rule-icon"
        [iconColor]="
          rule.isValid
            ? 'var(--color-success, #10b981)'
            : 'var(--color-error, #ef4444)'
        "
      ></aava-icon>
      <span class="rule-text">{{ rule.message }}</span>
    </div>
  </div>

  <!-- Confirm Password Input (Optional) -->
  <div
    *ngIf="showConfirmPassword"
    class="ava-reset-password__field ava-reset-password__field--confirm"
  >
    <aava-textbox
      [label]="confirmLabel"
      [placeholder]="confirmPlaceholder"
      [(ngModel)]="confirmPassword"
      [type]="showConfirmPasswordValue ? 'text' : 'password'"
      [size]="size"
      [disabled]="disabled"
      (ngModelChange)="onConfirmPasswordInput()"
      [error]="
        confirmPassword.length > 0 && !passwordsMatch
          ? 'Passwords do not match'
          : ''
      "
    >
      <!-- Eye icon to toggle confirm password visibility -->
      <aava-icon
        slot="icon-end"
        [iconName]="showConfirmPasswordValue ? 'eye' : 'eye-off'"
        [iconSize]="20"
        (click)="toggleConfirmPasswordVisibility()"
        class="password-toggle-icon"
      ></aava-icon>
    </aava-textbox>

    <!-- Passwords Match Indicator -->
    <div
      *ngIf="confirmPassword.length > 0 && password.length > 0"
      class="ava-reset-password__match-indicator"
    >
      <div
        class="match-item"
        [class.match-item--valid]="passwordsMatch"
        [class.match-item--invalid]="!passwordsMatch"
      >
        <aava-icon
          [iconName]="passwordsMatch ? 'check-circle' : 'x-circle'"
          [iconSize]="16"
          class="match-icon"
          [iconColor]="
            passwordsMatch
              ? 'var(--color-success, #10b981)'
              : 'var(--color-error, #ef4444)'
          "
        ></aava-icon>
        <span class="match-text">
          {{ passwordsMatch ? "Passwords match" : "Passwords do not match" }}
        </span>
      </div>
    </div>
  </div>
</div>
