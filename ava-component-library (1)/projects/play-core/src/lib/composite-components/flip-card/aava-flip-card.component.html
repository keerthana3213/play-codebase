<aava-card-content>
  <div class="flip-card" [ngStyle]="cssVariables">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <p class="title">{{ frontTitle }}</p>
        <p>{{ frontText }}</p>
      </div>
      <div class="flip-card-back">
        <p class="title">{{ backTitle }}</p>
        <p>{{ backText }}</p>
      </div>
    </div>
  </div>
</aava-card-content>
