<header [attr.id]="id ? 'aava-header-' + id : null">
  <div class="outer-box" [ngClass]="[theme, containerClass]" [ngStyle]="customStyles">
    <div class="container">
      <div class="row align-items-center">

        <!-- Left Section -->
        <div class="col-auto left-col">
          <ng-content select="[left-content]"></ng-content>
        </div>

        <!-- Center Section (separator attached here now) -->
        <div class="col-auto center-col">
          <ng-content select="[center-content]"></ng-content>
        </div>

        <!-- Right Section -->
        <div class="col-auto right-col">
          <ng-content select="[right-content]"></ng-content>
        </div>

      </div>
    </div>
  </div>
</header>
