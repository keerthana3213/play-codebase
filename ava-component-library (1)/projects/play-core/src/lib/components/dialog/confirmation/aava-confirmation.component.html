<div class="confirmation-dialog"
    [attr.id]="id ? 'aava-confirmation-' + id : null"
    [ngStyle]="customStyles"
    [ngClass]="[size, bottomBorder ? 'has-bottom-border' : '', destructive ? 'destructive' : '']">
    <div class="icon-container">
        <aava-icon [iconName]="effectiveIcon" [iconSize]="iconSize" [iconColor]="effectiveIconColor" aria-hidden="true">
        </aava-icon>
    </div>

    <h3 class="popup-title" id="popup-title" [ngClass]="{ 'destructive': destructive }">
        {{ title }}
    </h3>

    <p class="inline-text" [innerHTML]="message"></p>

    <div class="dialog-actions">
        <aava-button [label]="cancelButtonText" [variant]="cancelButtonVariant" size="md" (userClick)="onCancel()">
        </aava-button>

        <aava-button [label]="confirmButtonText" [variant]="effectiveConfirmVariant" size="md"
            (userClick)="onConfirm()">
        </aava-button>
    </div>
</div>
